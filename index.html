<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-10">

      <div class="card">

        <div class="card-header">
          <h3 class="mb-0">Payment form example</h3>
        </div>

        <div class="card-body">

          <div id="error-msg" class="alert alert-danger d-none">
            Some fields are missing
          </div>

          <form>

            <div class="row mt-4">

              <div class="col-sm-5 pb-3">
                <label for="cardNumber">Card #</label>
                <input class="form-control" id="cardNumber" name="cardNumber" placeholder="XXXXXXXXXXXXXXXX" type="text">
              </div>

              <div class="col-sm-3 pb-3">
                <label for="cvc">CVC #</label>
                <input class="form-control" id="cvc" name="cvc" placeholder="000" type="text">
              </div>

              <div class="col-sm-4 pb-3">
                <label for="amount">Amount</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fas fa-dollar-sign"></i>
                  </span>
                  <input class="form-control" id="amount" name="amount" placeholder="Amount" type="number">
                </div>
              </div>

              <div class="col-sm-6 pb-3">
                <label for="firstName">First Name</label>
                <input class="form-control" id="firstName" name="firstName" type="text">
              </div>

              <div class="col-sm-6 pb-3">
                <label for="lastName">Last Name</label>
                <input class="form-control" id="lastName" name="lastName" type="text">
              </div>

              <div class="col-sm-6 pb-3">
                <label for="city">City</label>
                <input class="form-control" id="city" name="city" type="text">
              </div>

              <div class="col-sm-3 pb-3">
                <label for="state">State</label>
                <select class="form-select" id="state" name="state">
                  <option value="">Pick a state</option>
                  <option>Madrid</option>
                  <option>Barcelona</option>
                  <option>Valencia</option>
                </select>
              </div>

              <div class="col-sm-3 pb-3">
                <label for="zip">Postal Code</label>
                <input class="form-control" id="zip" name="zip" type="text">
              </div>

              <div class="col-md-6 pb-3">
                <p>We accept:</p>
                <div class="btn-group" role="group">
                  <input type="radio" class="btn-check" name="payment" id="mastercard" checked>
                  <label class="btn btn-secondary" for="mastercard">
                    <i class="fab fa-cc-mastercard"></i>
                  </label>

                  <input type="radio" class="btn-check" name="payment" id="visa">
                  <label class="btn btn-secondary" for="visa">
                    <i class="fab fa-cc-visa"></i>
                  </label>

                  <input type="radio" class="btn-check" name="payment" id="amex">
                  <label class="btn btn-secondary" for="amex">
                    <i class="fab fa-cc-amex"></i>
                  </label>
                </div>
              </div>

              <div class="col-md-6 pb-3">
                <label for="message">Message</label>
                <textarea class="form-control" id="message" name="message" rows="3"></textarea>
                <small class="text-muted">Add any notes here.</small>
              </div>

            </div>
          </form>
        </div>

        <div class="card-footer text-end">
          <button class="btn btn-secondary" type="reset">Cancel</button>
          <button id="sendForm" class="btn btn-primary" type="button">Send</button>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="javascript.js"></script>

</body>
</html>
